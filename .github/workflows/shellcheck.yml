name: Shell checks

on:
  push:
    paths:
      - "**/*.sh"
      - ".github/workflows/shellcheck.yml"
  pull_request:
    paths:
      - "**/*.sh"
      - ".github/workflows/shellcheck.yml"

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck

      - name: Lint shell scripts
        run: |
          find scripts -type f -name '*.sh' -print0 | xargs -0 --no-run-if-empty shellcheck
